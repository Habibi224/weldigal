<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Challenge robot GEII</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body {
      font-family: "Georgia", serif;
      text-align: center;
      background: #fff;
      color: #000;
      margin: 0;
      padding: 0;
    }

    h1 {
      font-size: 4rem;
      font-style: italic;
      margin-top: 60px;
    }

    /* Section d'entrée compétition */
    .competition-input {
      margin-top: 30px;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 15px;
    }

    #competitionName {
      width: 400px;
      font-size: 1.3rem;
      font-style: italic;
      padding: 10px 15px;
      border: 2px solid #000;
      border-radius: 8px;
      text-align: center;
      outline: none;
    }

    #startButton {
      font-size: 1.2rem;
      font-style: italic;
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      background-color: #000;
      color: #fff;
      cursor: pointer;
      transition: background 0.3s;
    }

    #startButton:hover {
      background-color: #333;
    }

    /* Zone des robots */
    .robots {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 100px;
      margin-top: 60px;
    }

    .robot {
      text-align: center;
    }

    .robot-name {
      font-size: 2rem;
      font-weight: bold;
      font-style: italic;
      padding: 10px 20px;
      border: 2px solid #000;
      border-radius: 10px;
      width: 200px;
      margin: 0 auto;
      cursor: pointer;
      transition: background 0.3s;
    }

    .robot-name:hover {
      background: #f0f0f0;
    }

    .icons {
      margin-top: 10px;
      font-size: 2rem;
    }

    .icons i {
      display: block;
      margin: 10px auto;
      cursor: pointer;
      transition: transform 0.2s;
    }

    .icons i:hover {
      transform: scale(1.2);
    }

    .vs {
      font-size: 2rem;
      font-style: italic;
    }

    /* Boutons play/pause */
    .controls {
      margin-top: 60px;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 40px;
    }

    .btn-circle {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
      cursor: pointer;
      transition: transform 0.2s, background-color 0.2s;
    }

    .btn-play {
      background-color: white;
      border: 3px solid black;
      color: black;
    }

    .btn-play:hover {
      background-color: #eee;
      transform: scale(1.1);
    }

    .btn-pause {
      background-color: black;
      color: white;
    }

    .btn-pause:hover {
      background-color: #333;
      transform: scale(1.1);
    }

    /* Historique */
    .history {
      margin-top: 80px;
      font-size: 2.5rem;
      font-style: italic;
      font-weight: bold;
    }

    table {
      margin: 40px auto;
      width: 90%;
      border-collapse: collapse;
      font-size: 1.2rem;
      text-align: center;
      font-style: italic;
    }

    th, td {
      border: 1px solid #000;
      padding: 10px;
    }

    thead {
      background-color: #f7f7f7;
      font-weight: bold;
    }

    th[colspan] {
      font-size: 1.8rem;
      font-style: italic;
    }
  </style>
</head>
<body>

  <h1>Challenge robot GEII</h1>

  <div class="competition-input">
    <input type="text" id="competitionName" placeholder="Commencer en tapant le nom de la compétition">
    <button id="startButton" onclick="startCompetition()">Commencer</button>
  </div>

  <div class="robots">
    <div class="robot">
      <div id="robotAName" class="robot-name" onclick="badgeRobot('A')">Badger</div>
      <div class="icons">
        <i class="fa-regular fa-clock"></i>
        <i class="fa-solid fa-location-dot"></i>
      </div>
    </div>

    <div class="vs">VS</div>

    <div class="robot">
      <div id="robotBName" class="robot-name" onclick="badgeRobot('B')">Badger</div>
      <div class="icons">
        <i class="fa-regular fa-clock"></i>
        <i class="fa-solid fa-location-dot"></i>
      </div>
    </div>
  </div>

  <div class="controls">
    <button class="btn-circle btn-play"><i class="fa-solid fa-play"></i></button>
    <button class="btn-circle btn-pause"><i class="fa-solid fa-pause"></i></button>
  </div>

  <div class="history">Historique de la compétition</div>

 <table border="1" cellspacing="0" cellpadding="10" style="width: 80%; margin: auto; text-align: center; border-collapse: collapse; font-family: 'Times New Roman', serif;">
  <thead style="background-color: #f7f7f7;">
    <tr>
      <th colspan="3" style="font-size: 1.5rem; font-style: italic;">Nom de la compétition</th>
    </tr>
    <tr>
      <th>Nom des robots</th>
      <th>Robot A</th>
      <th>Robot B</th>
    </tr>
  </thead>
  <tbody>
    <tr>
      <td>Heure d’entrée</td>
      <td></td>
      <td></td>
    </tr>
    <tr>
      <td>Heure de sortie</td>
      <td></td>
      <td></td>
    </tr>
    <tr>
      <td>Temps de course brut</td>
      <td></td>
      <td></td>
    </tr>
    <tr>
      <td>Temps de course net</td>
      <td></td>
      <td></td>
    </tr>
  </tbody>
</table>


  <script>
    function startCompetition() {
      const input = document.getElementById("competitionName");
      if (input.value.trim() === "") {
        alert("Veuillez entrer le nom de la compétition !");
        return;
      }
      alert(`Compétition "${input.value}" démarrée !`);
    }

    function badgeRobot(robot) {
      const name = prompt(`Entrez le nom du robot ${robot}:`);
      if (name && name.trim() !== "") {
        document.getElementById(`robot${robot}Name`).textContent = name.trim();
      }
    }
  </script>

</body>
</html>
